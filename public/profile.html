<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — LocalServ</title>
  <meta name="description" content="View and update your profile on LocalServ." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="page-wrapper">
    <nav class="navbar solid" id="main-navbar"></nav>

    <main class="page-content">
      <div class="container">
        <div class="profile-card">
          <div class="profile-avatar" id="profile-avatar">?</div>
          <div class="profile-header">
            <h2 id="profile-name">Loading…</h2>
            <span class="badge" id="profile-role-badge"></span>
            <p id="profile-phone"></p>
          </div>

          <form id="profile-form" autocomplete="off">
            <div class="form-group">
              <label class="form-label" for="profile-name-input">Full Name</label>
              <div class="input-wrapper">
                <span class="material-icons-outlined input-icon">person</span>
                <input type="text" class="form-input has-icon" id="profile-name-input" placeholder="Your full name" required />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="profile-location-input">Location</label>
              <div class="input-wrapper">
                <span class="material-icons-outlined input-icon">location_on</span>
                <input type="text" class="form-input has-icon" id="profile-location-input" placeholder="Your city or area" required />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="profile-phone-input">Phone Number</label>
              <div class="input-wrapper">
                <span class="material-icons-outlined input-icon">phone</span>
                <input type="tel" class="form-input has-icon" id="profile-phone-input" disabled style="opacity:0.6;cursor:not-allowed;" />
              </div>
              <small style="color:var(--text-light);font-size:0.8rem;margin-top:4px;display:block;">Phone number cannot be changed</small>
            </div>

            <div class="form-group">
              <label class="form-label" for="profile-role-input">Role</label>
              <div class="input-wrapper">
                <span class="material-icons-outlined input-icon">badge</span>
                <input type="text" class="form-input has-icon" id="profile-role-input" disabled style="opacity:0.6;cursor:not-allowed;" />
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="update-btn">
              <span class="material-icons-outlined">save</span>
              Update Profile
            </button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
