<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Service — LocalServ</title>
  <meta name="description" content="Post a new service request and find skilled workers on LocalServ." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="page-wrapper">
    <nav class="navbar solid" id="main-navbar"></nav>

    <main class="page-content">
      <div class="container">
        <div class="form-card">
          <div class="form-card-header">
            <h2>Post a New Service</h2>
            <p style="color:var(--text-secondary);">Describe what you need and find the right worker</p>
          </div>

          <form id="add-service-form" autocomplete="off">
            <div class="form-group">
              <label class="form-label" for="service-name">Service Name</label>
              <div class="input-wrapper">
                <span class="material-icons-outlined input-icon">build</span>
                <input type="text" class="form-input has-icon" id="service-name" placeholder="e.g. Fan Repair, Pipe Fixing" required />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="service-category">Category</label>
              <select class="form-select" id="service-category" required>
                <option value="">Select a category</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="service-description">Description</label>
              <textarea class="form-textarea" id="service-description" rows="4" placeholder="Describe the work that needs to be done..." required></textarea>
            </div>

            <div class="form-group">
              <label class="form-label" for="service-cost">Expected Cost (₹)</label>
              <div class="input-wrapper">
                <span class="material-icons-outlined input-icon">currency_rupee</span>
                <input type="number" class="form-input has-icon" id="service-cost" placeholder="Enter your budget" min="1" required />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="service-location">Location</label>
              <div class="input-wrapper">
                <span class="material-icons-outlined input-icon">location_on</span>
                <input type="text" class="form-input has-icon" id="service-location" placeholder="e.g. Medchal, Hyderabad" required />
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
              <span class="material-icons-outlined">add_circle</span>
              Post Service
            </button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/add_service.js"></script>
</body>
</html>
