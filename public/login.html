<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — LocalServ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="brand-icon">🏠</div>
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
      </div>

      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="login-phone">Phone Number</label>
          <div class="input-wrapper">
            <span class="material-icons-outlined input-icon">phone</span>
            <input type="tel" class="form-input has-icon" id="login-phone" placeholder="Enter your phone number" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="input-wrapper">
            <span class="material-icons-outlined input-icon">lock</span>
            <input type="password" class="form-input has-icon" id="login-password" placeholder="Enter your password" required />
            <button type="button" class="password-toggle" id="toggle-password" tabindex="-1">
              <span class="material-icons-outlined">visibility</span>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Register</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
