<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worker Dashboard — LocalServ</title>
  <meta name="description" content="Browse available services and send proposals as a worker on LocalServ." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="page-wrapper">
    <nav class="navbar solid" id="main-navbar"></nav>

    <main class="page-content">
      <div class="container">
        <!-- Header -->
        <div class="dashboard-header" id="dashboard-header">
          <h1>Dashboard</h1>
          <p>Browse available services and send your proposals.</p>
        </div>

        <!-- Stats -->
        <div class="stats-row" id="stats-row">
          <div class="stat-card">
            <div class="stat-icon purple">💼</div>
            <div class="stat-info">
              <h3 id="stat-total">—</h3>
              <p>Proposals Sent</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green">✅</div>
            <div class="stat-info">
              <h3 id="stat-accepted">—</h3>
              <p>Accepted</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon yellow">⏳</div>
            <div class="stat-info">
              <h3 id="stat-pending">—</h3>
              <p>Pending</p>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon blue">📊</div>
            <div class="stat-info">
              <h3 id="stat-rate">—</h3>
              <p>Success Rate</p>
            </div>
          </div>
        </div>

        <!-- Search & Filter -->
        <div class="search-bar" id="search-bar">
          <div class="search-row">
            <input type="text" class="form-input" id="search-input" placeholder="🔍 Search services..." />
            <input type="text" class="form-input" id="location-input" placeholder="📍 Location..." />
            <select class="form-select" id="category-select">
              <option value="">All Categories</option>
            </select>
            <button class="btn btn-primary" id="search-btn" onclick="applyFilters()">Search</button>
          </div>
          <div class="category-chips" id="category-chips"></div>
        </div>

        <!-- Services Grid -->
        <div class="section-header" style="margin-top:32px;">
          <h2>Available Services</h2>
          <span class="badge badge-category" id="results-count">Loading...</span>
        </div>
        <div class="grid grid-3" id="services-container">
          <div class="loading-spinner" style="grid-column:1/-1;">
            <div class="spinner"></div>
            <p style="color:var(--text-secondary);font-size:0.9rem;">Loading services…</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/worker.js"></script>
</body>
</html>
