<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — LocalServ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card wide">
      <div class="auth-header">
        <div class="brand-icon">🏠</div>
        <h2>Create Account</h2>
        <p>Join our community of service providers and seekers</p>
      </div>

      <form id="register-form" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="reg-name">Full Name</label>
          <div class="input-wrapper">
            <span class="material-icons-outlined input-icon">person</span>
            <input type="text" class="form-input has-icon" id="reg-name" placeholder="Enter your full name" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-phone">Phone Number</label>
          <div class="input-wrapper">
            <span class="material-icons-outlined input-icon">phone</span>
            <input type="tel" class="form-input has-icon" id="reg-phone" placeholder="Enter your phone number" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <div class="input-wrapper">
            <span class="material-icons-outlined input-icon">lock</span>
            <input type="password" class="form-input has-icon" id="reg-password" placeholder="Create a password" required />
            <button type="button" class="password-toggle" id="toggle-reg-password" tabindex="-1">
              <span class="material-icons-outlined">visibility</span>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-location">Location</label>
          <div class="input-wrapper">
            <span class="material-icons-outlined input-icon">location_on</span>
            <input type="text" class="form-input has-icon" id="reg-location" placeholder="Enter your city or area" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">I am a…</label>
          <div class="role-selector">
            <div class="role-option">
              <input type="radio" name="role" id="role-owner" value="owner" checked />
              <label for="role-owner">
                <span class="role-icon">🏠</span>
                <span class="role-title">Service Owner</span>
                <span class="role-desc">I need services done</span>
              </label>
            </div>
            <div class="role-option">
              <input type="radio" name="role" id="role-worker" value="worker" />
              <label for="role-worker">
                <span class="role-icon">💼</span>
                <span class="role-title">Service Worker</span>
                <span class="role-desc">I provide services</span>
              </label>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-btn">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
